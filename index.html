<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ IDENTITY VORTEX | Hyper-Realistic Persona Generator</title>
    <!-- Google Fonts & Framer Motion via ESM (CDN) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Framer Motion + React + ReactDOM (for motion components) -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- framer-motion UMD (exposes window.FramerMotion) -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- tiny random data utilities -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #0B0C10, #030405);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* animated glassmorphic background blobs */
        .blob {
            position: fixed;
            width: 50vw;
            height: 50vw;
            filter: blur(100px);
            border-radius: 50%;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }
        .blob1 { background: #3b2eff; top: -20vh; left: -20vw; animation: floatBlob 22s infinite alternate ease-in-out; }
        .blob2 { background: #ff3b8c; bottom: -20vh; right: -15vw; animation: floatBlob 25s infinite alternate-reverse; }
        .blob3 { background: #00d9ff; top: 40vh; right: 30%; width: 30vw; height: 30vw; filter: blur(120px); opacity: 0.3; animation: slowDrift 30s infinite alternate; }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(8%, 12%) scale(1.2); }
        }
        @keyframes slowDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, 8%); }
        }

        /* main card container */
        .app-root {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* designer glass card */
        .persona-card {
            background: rgba(20, 22, 32, 0.68);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* layout grid */
        .grid-layout {
            display: grid;
            grid-template-columns: 0.9fr 1.2fr;
            gap: 2rem;
            padding: 2rem;
        }

        @media (max-width: 880px) {
            .grid-layout {
                grid-template-columns: 1fr;
                gap: 2rem;
                padding: 1.8rem;
            }
            body { padding: 1rem; }
        }

        /* left: portrait section */
        .portrait-area {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 2rem;
            backdrop-filter: blur(4px);
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,240,0.1);
        }

        .image-frame {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 2rem;
            overflow: hidden;
            background: #0f0f1c;
            box-shadow: 0 20px 35px -10px black;
            border: 2px solid rgba(255,215,0,0.2);
            transition: all 0.3s;
        }

        .person-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .persona-card:hover .person-img {
            transform: scale(1.02);
        }

        .gender-badge {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255,255,245,0.1);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            color: #ccc;
        }

        /* right: data stream */
        .data-section {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .info-panel {
            background: rgba(12, 14, 22, 0.7);
            border-radius: 1.8rem;
            padding: 1.4rem 1.8rem;
            border-left: 4px solid #ffd966;
            transition: all 0.2s;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            color: #ffd966;
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 1.45rem;
            font-weight: 600;
            color: #f0f3fa;
            word-break: break-word;
            letter-spacing: -0.2px;
            font-family: 'Inter', monospace;
        }

        .credit-card-sim {
            background: linear-gradient(135deg, #1a1e2c, #0b0d16);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-top: 0.5rem;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .cc-number {
            font-family: monospace;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }

        .generate-btn {
            background: linear-gradient(95deg, #ffb347, #ff6b4a);
            border: none;
            padding: 1rem 0;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border-radius: 3rem;
            color: #0b0c10;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            box-shadow: 0 5px 15px rgba(255,107,74,0.4);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 15px 25px -8px #ff6b4a;
        }

        .generate-btn:active {
            transform: translateY(2px);
        }

        .refresh-icon {
            font-size: 1.4rem;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,210,0.5);
            margin-top: 1rem;
            letter-spacing: 0.5px;
        }

        .ssn-field, .street-field {
            font-family: monospace;
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(8px);}
            100% { opacity: 1; transform: translateY(0);}
        }

        .animate-value {
            animation: fadeSlide 0.3s ease-out;
        }
    </style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div id="root" class="app-root"></div>

<script>
    // ----------------------------- FAKE DATA GENERATORS (NO API, fully offline) -------------------------
    // realistic first/last names per gender & unisex pool
    const maleFirst = ["James", "John", "Robert", "Michael", "William", "David", "Richard", "Joseph", "Thomas", "Charles", "Daniel", "Matthew", "Anthony", "Donald", "Mark", "Paul", "Steven", "Andrew", "Kenneth", "Joshua", "Kevin", "Brian", "George", "Edward", "Ronald"];
    const femaleFirst = ["Mary", "Patricia", "Jennifer", "Linda", "Elizabeth", "Barbara", "Susan", "Jessica", "Sarah", "Karen", "Nancy", "Lisa", "Betty", "Margaret", "Sandra", "Ashley", "Kimberly", "Emily", "Donna", "Michelle", "Dorothy", "Carol", "Amanda", "Melissa", "Deborah"];
    const lastNames = ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis", "Rodriguez", "Martinez", "Hernandez", "Lopez", "Gonzalez", "Wilson", "Anderson", "Thomas", "Taylor", "Moore", "Jackson", "Martin", "Lee", "Perez", "Thompson", "White", "Harris", "Sanchez", "Clark", "Ramirez", "Lewis", "Robinson"];

    // street name pools
    const streetNames = ["Main", "Oak", "Pine", "Maple", "Cedar", "Elm", "Washington", "Lake", "Hill", "Sunset", "Broadway", "Park", "Chestnut", "Willow", "Birch", "Magnolia", "Rosewood", "Fairview", "Hollywood", "Springfield"];
    const streetSuffix = ["Street", "Avenue", "Road", "Lane", "Drive", "Court", "Place", "Way", "Boulevard", "Terrace"];

    // city, state, zip realistic
    const cities = ["New York", "Los Angeles", "Chicago", "Houston", "Phoenix", "Philadelphia", "San Antonio", "San Diego", "Dallas", "Austin", "Boston", "Seattle", "Denver", "Miami", "Portland", "Atlanta", "Detroit", "Minneapolis"];
    const states = ["AL", "AK", "AZ", "AR", "CA", "CO", "CT", "DE", "FL", "GA", "HI", "ID", "IL", "IN", "IA", "KS", "KY", "LA", "ME", "MD", "MA", "MI", "MN", "MS", "MO", "MT", "NE", "NV", "NH", "NJ", "NM", "NY", "NC", "ND", "OH", "OK", "OR", "PA", "RI", "SC", "SD", "TN", "TX", "UT", "VT", "VA", "WA", "WV", "WI", "WY"];

    // generate random SSN (XXX-XX-XXXX format, fake range)
    function randomSSN() {
        const part1 = Math.floor(Math.random() * 900) + 100;
        const part2 = Math.floor(Math.random() * 90) + 10;
        const part3 = Math.floor(Math.random() * 10000);
        return `${part1}-${part2}-${String(part3).padStart(4,'0')}`;
    }

    // credit card: generate valid-looking Luhn? but just fake prefix 4/5/6 + random digits
    function randomCreditCard() {
        const prefixes = ['4532', '4916', '5282', '5589', '6011', '6521', '3714', '3782'];
        const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        let body = '';
        for (let i = 0; i < 12; i++) body += Math.floor(Math.random() * 10);
        let cc = prefix + body;
        // format as groups
        return cc.match(/.{1,4}/g).join(' ');
    }

    function randomExpiry() {
        const month = Math.floor(Math.random() * 12) + 1;
        const year = 24 + Math.floor(Math.random() * 8); // 2024 to 2031
        return `${String(month).padStart(2,'0')}/${year}`;
    }

    function randomCVV() {
        return Math.floor(Math.random() * 900) + 100;
    }

    // generate full address
    function randomAddress() {
        const number = Math.floor(Math.random() * 9999) + 100;
        const street = streetNames[Math.floor(Math.random() * streetNames.length)];
        const suffix = streetSuffix[Math.floor(Math.random() * streetSuffix.length)];
        const city = cities[Math.floor(Math.random() * cities.length)];
        const state = states[Math.floor(Math.random() * states.length)];
        const zip = Math.floor(Math.random() * 90000) + 10000;
        return `${number} ${street} ${suffix}, ${city}, ${state} ${zip}`;
    }

    // pick gender based on name or we define gender explicit for image mapping
    function getGenderFromName(firstName, maleList, femaleList) {
        if (maleList.includes(firstName)) return 'male';
        if (femaleList.includes(firstName)) return 'female';
        // fallback: last char heuristic? but our sets cover most; extra unisex -> random
        return Math.random() > 0.5 ? 'male' : 'female';
    }

    // Image URL: we use randomuser.me for realistic free portraits? BUT it's an external API and requires no key? randomuser.me is free, but I want FULL offline / no API dependency? however randomuser provides free images with consistent gender. BUT your requirement: "free like the images we can use random images of people just keep in mind if we use a man name a man image should come up and it should look real"
    // To be 100% API-free, I can use a seeded generated avatar using "thispersondoesnotexist" is not reliable. Instead I'll use a massive free library: "picsum" but that is not realistic people. Therefore best approach: use reliable free avatar generator: "randomuser.me" is FREE and open, no API key, unlimited CORS. It gives high-quality realistic person images per gender. That matches your requirement. We'll fetch from randomuser.me/portraits/ (official). Since it's free and widely used, it's allowed. We also implement fallback local generation if network fails? but it's stable.
    // For total offline-proof, I will embed placeholder but randomuser works 100% without payment. Also respects gender mapping.
    // Strategy: Based on gender and random index, we pick from randomuser's official images (pre-generated realistic). We use "https://randomuser.me/api/portraits/{gender}/{random}.jpg" where gender = men/women. index 0-99. This provides diverse realistic faces, no API overhead except image loading. It's free and reliable.
    function getPersonImage(gender, seedId) {
        const base = "https://randomuser.me/api/portraits/";
        const folder = gender === 'male' ? "men" : "women";
        // use a consistent but random index based on the persona seed (to keep image linked to name generation)
        const idx = (seedId % 98) + 1; // 1-99 range, avoids 0 sometimes missing
        return `${base}${folder}/${idx}.jpg`;
    }

    // Full persona object with all fields
    function generatePersona(seed = null) {
        const useSeed = seed !== null ? seed : Math.floor(Math.random() * 100000);
        const rng = (max) => {
            // deterministic-like but still random enough
            const x = Math.sin(useSeed + max) * 10000;
            return Math.floor((x - Math.floor(x)) * max);
        };
        // random name based on gender? we decide gender first? Better: random gender then choose name accordingly.
        const genderChoice = Math.random() > 0.5 ? 'male' : 'female';
        let firstName = '';
        if (genderChoice === 'male') {
            firstName = maleFirst[Math.floor(Math.random() * maleFirst.length)];
        } else {
            firstName = femaleFirst[Math.floor(Math.random() * femaleFirst.length)];
        }
        // verify gender mapping consistency:
        const finalGender = genderChoice;
        const lastName = lastNames[Math.floor(Math.random() * lastNames.length)];
        const fullName = `${firstName} ${lastName}`;
        const ssn = randomSSN();
        const streetAddress = randomAddress();
        const creditCardNumber = randomCreditCard();
        const expiry = randomExpiry();
        const cvv = randomCVV();
        const imageSeed = (fullName.length * 127 + Math.floor(Math.random() * 999));
        const imageUrl = getPersonImage(finalGender, imageSeed);
        // Additional meta info
        return {
            name: fullName,
            gender: finalGender,
            address: streetAddress,
            ssn: ssn,
            creditCard: {
                number: creditCardNumber,
                expiry: expiry,
                cvv: cvv
            },
            image: imageUrl,
            rawSeed: imageSeed
        };
    }

    // ----------------------------- REACT + FRAMER MOTION COMPONENT -----------------------------------
    const { useState, useEffect, useRef } = React;
    // framer motion from global
    const { motion, AnimatePresence } = window.FramerMotion;

    // main app
    const IdentityGenerator = () => {
        const [persona, setPersona] = useState(null);
        const [animateKey, setAnimateKey] = useState(0);
        const [loadingImage, setLoadingImage] = useState(false);

        const refreshPersona = () => {
            setLoadingImage(true);
            const newPerson = generatePersona();
            setPersona(newPerson);
            setAnimateKey(prev => prev + 1);
            // image loading simulated smooth
            setTimeout(() => setLoadingImage(false), 200);
        };

        useEffect(() => {
            // initial persona on mount
            const initial = generatePersona();
            setPersona(initial);
        }, []);

        if (!persona) return <div style={{color:'white', textAlign:'center'}}>🌀 generating reality...</div>;

        // data fields with animation wrapper
        const AnimatedField = ({ label, value, isCode = false }) => (
            <motion.div 
                key={animateKey + label}
                initial={{ opacity: 0, y: 10 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 0.25, ease: "easeOut" }}
                className="info-panel"
            >
                <div className="info-label">{label}</div>
                <div className={`info-value ${isCode ? 'ssn-field' : ''}`}>{value}</div>
            </motion.div>
        );

        return (
            <motion.div
                initial={{ opacity: 0, scale: 0.96 }}
                animate={{ opacity: 1, scale: 1 }}
                transition={{ duration: 0.5, type: "spring", stiffness: 100 }}
                className="persona-card"
            >
                <div className="grid-layout">
                    {/* Left side - portrait with motion */}
                    <div className="portrait-area">
                        <motion.div 
                            className="image-frame"
                            whileHover={{ scale: 1.02 }}
                            transition={{ type: "spring", stiffness: 300 }}
                        >
                            <img 
                                src={persona.image} 
                                alt={`portrait of ${persona.name}`}
                                className="person-img"
                                onError={(e) => {
                                    // fallback if randomuser fails (extremely rare) -> use placeholder gradient
                                    e.target.src = "https://via.placeholder.com/400x400?text=✨+Persona";
                                }}
                            />
                        </motion.div>
                        <motion.div 
                            className="gender-badge"
                            initial={{ width: 0 }}
                            animate={{ width: "auto" }}
                            transition={{ delay: 0.1 }}
                        >
                            {persona.gender === 'male' ? '♂ MASCULINE PROFILE' : '♀ FEMININE PROFILE'}
                        </motion.div>
                    </div>

                    {/* Right side - Identity data */}
                    <div className="data-section">
                        <AnimatedField label="FULL LEGAL NAME" value={persona.name} />
                        <AnimatedField label="STREET & RESIDENCE" value={persona.address} />
                        <AnimatedField label="SOCIAL SECURITY NUMBER (SSN)" value={persona.ssn} isCode={true} />
                        
                        {/* CREDIT CARD premium block */}
                        <motion.div 
                            key={animateKey + "cc"}
                            initial={{ opacity: 0, y: 12 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.3, delay: 0.05 }}
                            className="credit-card-sim"
                        >
                            <div className="info-label" style={{color:'#ffb347'}}>💳 CREDIT CARD (FAKE)</div>
                            <div className="info-value cc-number" style={{fontSize:'1.25rem', letterSpacing:'1px'}}>{persona.creditCard.number}</div>
                            <div style={{display:'flex', justifyContent:'space-between', marginTop:'12px', color:'#bbb', fontSize:'0.8rem'}}>
                                <span>EXP: {persona.creditCard.expiry}</span>
                                <span>CVV: {persona.creditCard.cvv}</span>
                                <span>💎 VISA/MASTERCARD</span>
                            </div>
                        </motion.div>
                        
                        <motion.button
                            whileHover={{ scale: 1.02 }}
                            whileTap={{ scale: 0.97 }}
                            className="generate-btn"
                            onClick={refreshPersona}
                        >
                            <span className="refresh-icon">⟳</span> GENERATE NEW PERSONA
                        </motion.button>
                        <div className="footer-note">
                            ⚡ every click → new identity • fully synthetic data • images from randomuser.me (free)
                        </div>
                    </div>
                </div>
            </motion.div>
        );
    };

    // Render React app
    const rootElement = document.getElementById('root');
    const reactRoot = ReactDOM.createRoot(rootElement);
    reactRoot.render(React.createElement(IdentityGenerator, null));
</script>
</body>
</html>
