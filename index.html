<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ IDENTITY VORTEX | Hyper-Realistic Persona Generator</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #0B0C10, #030405);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* animated glassmorphic background blobs */
        .blob {
            position: fixed;
            width: 50vw;
            height: 50vw;
            filter: blur(100px);
            border-radius: 50%;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }
        .blob1 { background: #3b2eff; top: -20vh; left: -20vw; animation: floatBlob 22s infinite alternate ease-in-out; }
        .blob2 { background: #ff3b8c; bottom: -20vh; right: -15vw; animation: floatBlob 25s infinite alternate-reverse; }
        .blob3 { background: #00d9ff; top: 40vh; right: 30%; width: 30vw; height: 30vw; filter: blur(120px); opacity: 0.3; animation: slowDrift 30s infinite alternate; }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(8%, 12%) scale(1.2); }
        }
        @keyframes slowDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, 8%); }
        }

        /* main card container */
        .app-root {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* designer glass card */
        .persona-card {
            background: rgba(20, 22, 32, 0.68);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* layout grid */
        .grid-layout {
            display: grid;
            grid-template-columns: 0.9fr 1.2fr;
            gap: 2rem;
            padding: 2rem;
        }

        @media (max-width: 880px) {
            .grid-layout {
                grid-template-columns: 1fr;
                gap: 2rem;
                padding: 1.8rem;
            }
            body { padding: 1rem; }
        }

        /* left: portrait section */
        .portrait-area {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 2rem;
            backdrop-filter: blur(4px);
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,240,0.1);
        }

        .image-frame {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 2rem;
            overflow: hidden;
            background: #0f0f1c;
            box-shadow: 0 20px 35px -10px black;
            border: 2px solid rgba(255,215,0,0.2);
            transition: all 0.3s;
        }

        .person-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .persona-card:hover .person-img {
            transform: scale(1.02);
        }

        .gender-badge {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255,255,245,0.1);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            color: #ccc;
        }

        /* right: data stream */
        .data-section {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .info-panel {
            background: rgba(12, 14, 22, 0.7);
            border-radius: 1.8rem;
            padding: 1.4rem 1.8rem;
            border-left: 4px solid #ffd966;
            transition: all 0.2s;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            color: #ffd966;
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 1.45rem;
            font-weight: 600;
            color: #f0f3fa;
            word-break: break-word;
            letter-spacing: -0.2px;
            font-family: 'Inter', monospace;
        }

        .credit-card-sim {
            background: linear-gradient(135deg, #1a1e2c, #0b0d16);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-top: 0.5rem;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .cc-number {
            font-family: monospace;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }

        .generate-btn {
            background: linear-gradient(95deg, #ffb347, #ff6b4a);
            border: none;
            padding: 1rem 0;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border-radius: 3rem;
            color: #0b0c10;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            box-shadow: 0 5px 15px rgba(255,107,74,0.4);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 15px 25px -8px #ff6b4a;
        }

        .generate-btn:active {
            transform: translateY(2px);
        }

        .refresh-icon {
            font-size: 1.4rem;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,210,0.5);
            margin-top: 1rem;
            letter-spacing: 0.5px;
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(8px);}
            100% { opacity: 1; transform: translateY(0);}
        }

        .loading {
            color: white;
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div id="root" class="app-root">
    <div class="loading">🌀 Loading Identity Vortex...</div>
</div>

<script>
    // ----------------------------- FAKE DATA GENERATORS -------------------------
    const maleFirst = ["James", "John", "Robert", "Michael", "William", "David", "Richard", "Joseph", "Thomas", "Charles", "Daniel", "Matthew", "Anthony", "Donald", "Mark", "Paul", "Steven", "Andrew", "Kenneth", "Joshua", "Kevin", "Brian", "George", "Edward", "Ronald"];
    const femaleFirst = ["Mary", "Patricia", "Jennifer", "Linda", "Elizabeth", "Barbara", "Susan", "Jessica", "Sarah", "Karen", "Nancy", "Lisa", "Betty", "Margaret", "Sandra", "Ashley", "Kimberly", "Emily", "Donna", "Michelle", "Dorothy", "Carol", "Amanda", "Melissa", "Deborah"];
    const lastNames = ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis", "Rodriguez", "Martinez", "Hernandez", "Lopez", "Gonzalez", "Wilson", "Anderson", "Thomas", "Taylor", "Moore", "Jackson", "Martin", "Lee", "Perez", "Thompson", "White", "Harris", "Sanchez", "Clark", "Ramirez", "Lewis", "Robinson"];

    const streetNames = ["Main", "Oak", "Pine", "Maple", "Cedar", "Elm", "Washington", "Lake", "Hill", "Sunset", "Broadway", "Park", "Chestnut", "Willow", "Birch", "Magnolia", "Rosewood", "Fairview", "Hollywood", "Springfield"];
    const streetSuffix = ["Street", "Avenue", "Road", "Lane", "Drive", "Court", "Place", "Way", "Boulevard", "Terrace"];
    const cities = ["New York", "Los Angeles", "Chicago", "Houston", "Phoenix", "Philadelphia", "San Antonio", "San Diego", "Dallas", "Austin", "Boston", "Seattle", "Denver", "Miami", "Portland", "Atlanta", "Detroit", "Minneapolis"];
    const states = ["AL", "AK", "AZ", "AR", "CA", "CO", "CT", "DE", "FL", "GA", "HI", "ID", "IL", "IN", "IA", "KS", "KY", "LA", "ME", "MD", "MA", "MI", "MN", "MS", "MO", "MT", "NE", "NV", "NH", "NJ", "NM", "NY", "NC", "ND", "OH", "OK", "OR", "PA", "RI", "SC", "SD", "TN", "TX", "UT", "VT", "VA", "WA", "WV", "WI", "WY"];

    function randomSSN() {
        const part1 = Math.floor(Math.random() * 900) + 100;
        const part2 = Math.floor(Math.random() * 90) + 10;
        const part3 = Math.floor(Math.random() * 10000);
        return `${part1}-${part2}-${String(part3).padStart(4,'0')}`;
    }

    function randomCreditCard() {
        const prefixes = ['4532', '4916', '5282', '5589', '6011', '6521', '3714', '3782'];
        const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        let body = '';
        for (let i = 0; i < 12; i++) body += Math.floor(Math.random() * 10);
        let cc = prefix + body;
        return cc.match(/.{1,4}/g).join(' ');
    }

    function randomExpiry() {
        const month = Math.floor(Math.random() * 12) + 1;
        const year = 24 + Math.floor(Math.random() * 8);
        return `${String(month).padStart(2,'0')}/${year}`;
    }

    function randomCVV() {
        return Math.floor(Math.random() * 900) + 100;
    }

    function randomAddress() {
        const number = Math.floor(Math.random() * 9999) + 100;
        const street = streetNames[Math.floor(Math.random() * streetNames.length)];
        const suffix = streetSuffix[Math.floor(Math.random() * streetSuffix.length)];
        const city = cities[Math.floor(Math.random() * cities.length)];
        const state = states[Math.floor(Math.random() * states.length)];
        const zip = Math.floor(Math.random() * 90000) + 10000;
        return `${number} ${street} ${suffix}, ${city}, ${state} ${zip}`;
    }

    function getPersonImage(gender, seedId) {
        const base = "https://randomuser.me/api/portraits/";
        const folder = gender === 'male' ? "men" : "women";
        const idx = (seedId % 98) + 1;
        return `${base}${folder}/${idx}.jpg`;
    }

    function generatePersona() {
        const genderChoice = Math.random() > 0.5 ? 'male' : 'female';
        let firstName = '';
        if (genderChoice === 'male') {
            firstName = maleFirst[Math.floor(Math.random() * maleFirst.length)];
        } else {
            firstName = femaleFirst[Math.floor(Math.random() * femaleFirst.length)];
        }
        const lastName = lastNames[Math.floor(Math.random() * lastNames.length)];
        const fullName = `${firstName} ${lastName}`;
        const ssn = randomSSN();
        const streetAddress = randomAddress();
        const creditCardNumber = randomCreditCard();
        const expiry = randomExpiry();
        const cvv = randomCVV();
        const imageSeed = (fullName.length * 127 + Math.floor(Math.random() * 999));
        const imageUrl = getPersonImage(genderChoice, imageSeed);
        
        return {
            name: fullName,
            gender: genderChoice,
            address: streetAddress,
            ssn: ssn,
            creditCard: {
                number: creditCardNumber,
                expiry: expiry,
                cvv: cvv
            },
            image: imageUrl
        };
    }

    // ----------------------------- REACT + FRAMER MOTION (Simplified without external deps) -------------------------
    // Using pure HTML/CSS/JS with smooth animations instead of React to avoid dependency issues
    
    let currentPersona = null;
    
    function updateUI(persona) {
        // Update all fields with animation
        const elements = {
            name: document.getElementById('persona-name'),
            address: document.getElementById('persona-address'),
            ssn: document.getElementById('persona-ssn'),
            ccNumber: document.getElementById('cc-number'),
            ccExpiry: document.getElementById('cc-expiry'),
            ccCvv: document.getElementById('cc-cvv'),
            genderBadge: document.getElementById('gender-badge'),
            personImg: document.getElementById('person-img')
        };
        
        if (elements.name) {
            elements.name.classList.add('animate-value');
            elements.name.textContent = persona.name;
            setTimeout(() => elements.name.classList.remove('animate-value'), 300);
        }
        if (elements.address) {
            elements.address.classList.add('animate-value');
            elements.address.textContent = persona.address;
            setTimeout(() => elements.address.classList.remove('animate-value'), 300);
        }
        if (elements.ssn) {
            elements.ssn.classList.add('animate-value');
            elements.ssn.textContent = persona.ssn;
            setTimeout(() => elements.ssn.classList.remove('animate-value'), 300);
        }
        if (elements.ccNumber) {
            elements.ccNumber.classList.add('animate-value');
            elements.ccNumber.textContent = persona.creditCard.number;
            setTimeout(() => elements.ccNumber.classList.remove('animate-value'), 300);
        }
        if (elements.ccExpiry) elements.ccExpiry.textContent = persona.creditCard.expiry;
        if (elements.ccCvv) elements.ccCvv.textContent = persona.creditCard.cvv;
        if (elements.genderBadge) {
            elements.genderBadge.textContent = persona.gender === 'male' ? '♂ MASCULINE PROFILE' : '♀ FEMININE PROFILE';
        }
        if (elements.personImg) {
            elements.personImg.src = persona.image;
            elements.personImg.alt = `portrait of ${persona.name}`;
        }
    }
    
    function refreshPersona() {
        currentPersona = generatePersona();
        updateUI(currentPersona);
    }
    
    function renderApp() {
        currentPersona = generatePersona();
        
        const html = `
            <div class="persona-card">
                <div class="grid-layout">
                    <div class="portrait-area">
                        <div class="image-frame">
                            <img id="person-img" class="person-img" src="${currentPersona.image}" alt="portrait">
                        </div>
                        <div id="gender-badge" class="gender-badge">${currentPersona.gender === 'male' ? '♂ MASCULINE PROFILE' : '♀ FEMININE PROFILE'}</div>
                    </div>
                    <div class="data-section">
                        <div class="info-panel">
                            <div class="info-label">FULL LEGAL NAME</div>
                            <div id="persona-name" class="info-value">${currentPersona.name}</div>
                        </div>
                        <div class="info-panel">
                            <div class="info-label">STREET & RESIDENCE</div>
                            <div id="persona-address" class="info-value">${currentPersona.address}</div>
                        </div>
                        <div class="info-panel">
                            <div class="info-label">SOCIAL SECURITY NUMBER (SSN)</div>
                            <div id="persona-ssn" class="info-value ssn-field">${currentPersona.ssn}</div>
                        </div>
                        <div class="credit-card-sim">
                            <div class="info-label" style="color:#ffb347">💳 CREDIT CARD (FAKE)</div>
                            <div id="cc-number" class="info-value cc-number" style="font-size:1.25rem; letter-spacing:1px">${currentPersona.creditCard.number}</div>
                            <div style="display:flex; justify-content:space-between; margin-top:12px; color:#bbb; font-size:0.8rem">
                                <span>EXP: <span id="cc-expiry">${currentPersona.creditCard.expiry}</span></span>
                                <span>CVV: <span id="cc-cvv">${currentPersona.creditCard.cvv}</span></span>
                                <span>💎 VISA/MASTERCARD</span>
                            </div>
                        </div>
                        <button class="generate-btn" id="generateBtn">
                            <span class="refresh-icon">⟳</span> GENERATE NEW PERSONA
                        </button>
                        <div class="footer-note">
                            ⚡ every click → new identity • fully synthetic data • images from randomuser.me (free)
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('root').innerHTML = html;
        
        // Attach event listener
        const btn = document.getElementById('generateBtn');
        if (btn) {
            btn.addEventListener('click', () => {
                refreshPersona();
            });
        }
    }
    
    // Add animation CSS
    const style = document.createElement('style');
    style.textContent = `
        .animate-value {
            animation: fadeSlide 0.3s ease-out !important;
        }
    `;
    document.head.appendChild(style);
    
    // Start the app
    renderApp();
</script>
</body>
</html>
